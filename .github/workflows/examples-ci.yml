name: Examples CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-examples:
    name: Test Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Examples
        run: cargo check --examples --workspace --all-features

      - name: Run Research Agent (Offline)
        run: cargo run --example research_agent

      - name: Run Research Agent (Online/Net)
        run: cargo run --example research_agent --features net

      - name: Run Planning Agent
        run: cargo run --example planning_agent

      - name: Run Multi-Agent Pipeline
        run: cargo run --example multi_agent_pipeline

      - name: Run Custom Agent
        run: cargo run --example custom_agent

      - name: Run Knowledge Agent
        run: cargo run --example knowledge_agent

      - name: Run PDF Research Agent
        run: cargo run --example pdf_research_agent --features knowledge

      - name: Run Full Lifecycle Agent
        run: cargo run --example full_lifecycle

      - name: Run Learning Agent
        run: cargo run --example learning_agent

      - name: Run Federated Learning
        run: cargo run --example federated_learning
